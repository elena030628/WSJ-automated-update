name: WSJ Headlines Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-headlines:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run WSJ headlines script
        run: python3 wsj_headlines.py | tee headlines/latest.txt

      - name: Archive with timestamp
        run: |
          mkdir -p headlines/archive
          cp headlines/latest.txt headlines/archive/$(date -u +%Y-%m-%d_%H00).txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add headlines/
          git diff --staged --quiet || git commit -m "headlines: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
